{% extends 'partials/base.html' %}
{% block title %} Delete Page{% endblock  %}

{% block content %}
<div class="conteiner">
    <div class="row mt-5">
        <div class="col-md-6 offset-md-3">
            <div class="borde bg-white p-3">
                <h3>Delete Item</h3>
                <hr>
                <div class="alert alert-danger">
                    <h4>Are you sure want to delete?</h4>

                </div>
                <form method="POST">
                    {% csrf_token %}
                    {{form}}
                    <a class= "btn btn-secondary" href="{% url "dashboard-products" %}">Cancel</a>
                    <input class= "btn btn-danger" type="submit" value="confirm"> 
                  
                </form>
            </div>


        </div>
    </div>
</div>
{% endblock  %}
